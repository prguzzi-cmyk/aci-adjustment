#Elastic Beanstalk Nginx Configuration File

user                    nginx;
error_log               /var/log/nginx/error.log warn;
pid                     /var/run/nginx.pid;
worker_processes        auto;
worker_rlimit_nofile    32634;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    include       conf.d/*.conf;

    map $http_upgrade $connection_upgrade {
        default     "upgrade";
    }

    server {
        # Listen Non SSL port
        listen 80;
        # listen [::]:80;

        # Server Configuration
        server_name aciadjustment.com www.aciadjustment.com;

        # Redirect traffic to secure port
        return 301 https://aciadjustment.com$request_uri;

        # include conf.d/elasticbeanstalk/*.conf;
    }

    server {
        # Listen SSL port
        listen 443;
        # listen [::]:443 ssl http2;

        # Server Configuration
        server_name www.aciadjustment.com;

        # Redirect traffic to secure port
        return 301 https://aciadjustment.com$request_uri;
    }

    server {
        # Listen SSL port
        listen 443 ssl http2 default_server;
        # listen [::]:443 ssl http2 default_server;
        
        server_name aciadjustment.com;

        # Logs files
        access_log    /var/log/nginx/access.log main;

        # Server Configuration
        client_header_timeout 60;
        client_body_timeout   60;
        keepalive_timeout     60;
        gzip                  off;
        gzip_comp_level       4;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        # Certificates used for SSL
        ssl_certificate /etc/pki/tls/certs/server.crt;
        ssl_certificate_key /etc/pki/tls/certs/server.key;
        ssl_password_file /etc/pki/tls/certs/serverssl.txt;

        # Set client body size to 64M
        client_max_body_size 64M;

        # Include the Elastic Beanstalk generated locations
        include conf.d/elasticbeanstalk/*.conf;
    }
}